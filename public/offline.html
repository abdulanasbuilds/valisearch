<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ValiSearch — Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0A0A0A;
        color: #F0F0F0;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        padding: 2rem;
      }
      .container {
        text-align: center;
        max-width: 420px;
      }
      .icon {
        font-size: 3rem;
        margin-bottom: 1.5rem;
        opacity: 0.5;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
      }
      p {
        font-size: 0.875rem;
        color: rgba(255, 255, 255, 0.4);
        line-height: 1.6;
      }
      .retry {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.625rem 1.5rem;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 0.5rem;
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.8125rem;
        text-decoration: none;
        cursor: pointer;
        transition: all 0.15s;
      }
      .retry:hover {
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.8);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>You are offline</h1>
      <p>
        Your last analysis is still available in the app.
        Reconnect to validate new ideas.
      </p>
      <a class="retry" onclick="window.location.reload()">Try again</a>
    </div>
  </body>
</html>
